name: Sync and Translate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force retranslate all files'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '22'

permissions:
  contents: write

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync upstream docs
        run: node scripts/sync-upstream.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: check_changes
        run: |
          if [ -f "translation-queue.json" ]; then
            FILE_COUNT=$(jq '.files | length' translation-queue.json)
            echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "file_count=0" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Translate docs
        if: steps.check_changes.outputs.has_changes == 'true'
        run: node scripts/translate.js
        env:
          TRANSLATION_API_URL: ${{ secrets.TRANSLATION_API_URL }}
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
          TRANSLATION_MODEL: ${{ secrets.TRANSLATION_MODEL }}

      - name: Verify translations
        if: steps.check_changes.outputs.has_changes == 'true'
        run: node scripts/verify.js
        env:
          TRANSLATION_API_URL: ${{ secrets.TRANSLATION_API_URL }}
          TRANSLATION_API_KEY: ${{ secrets.TRANSLATION_API_KEY }}
          TRANSLATION_MODEL: ${{ secrets.TRANSLATION_MODEL }}

      - name: Commit translations
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/zh/ translation-queue.json docs/.file-hashes.json
          git diff --staged --quiet || git commit -m "chore: update translations [skip ci]"
          git push

      - name: Build site
        run: node scripts/build.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
